services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: music_game
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d music_game"]
      interval: 3s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine

  cekikilami-backend:
    container_name: cekikilami-backend
    build:
      context: ./backend
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres@postgres:5432/music_game
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: https://cekikilami.lucasspitzer.fr
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - default
      - proxy
    restart: on-failure

  cekikilami-frontend:
    container_name: cekikilami-frontend
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://cekikilami.lucasspitzer.fr/api
        VITE_SOCKET_URL: https://cekikilami.lucasspitzer.fr
    depends_on:
      - cekikilami-backend
    networks:
      - default
      - proxy

volumes:
  postgres_data:

networks:
  proxy:
    external: true
