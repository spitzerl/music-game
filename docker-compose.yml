services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: music_game
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal-network

  redis:
    image: redis:7-alpine
    networks:
      - internal-network

  backend:
    build:
      context: ./backend
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres@postgres:5432/music_game
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: https://devine-beat.lucasspitzer.fr
    depends_on:
      - postgres
      - redis
    networks:
      - internal-network
      - traefik-network # Connecté au réseau de Traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.musicgame-backend.rule=Host(`devine-beat.lucasspitzer.fr`) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`))"
      - "traefik.http.routers.musicgame-backend.entrypoints=websecure"
      - "traefik.http.routers.musicgame-backend.tls=true"
      - "traefik.http.routers.musicgame-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.musicgame-backend.loadbalancer.server.port=3001"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://devine-beat.lucasspitzer.fr/api
        VITE_SOCKET_URL: https://devine-beat.lucasspitzer.fr
    depends_on:
      - backend
    networks:
      - internal-network
      - traefik-network # Connecté au réseau de Traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.musicgame-frontend.rule=Host(`devine-beat.lucasspitzer.fr`)"
      - "traefik.http.routers.musicgame-frontend.entrypoints=websecure"
      - "traefik.http.routers.musicgame-frontend.tls=true"
      - "traefik.http.routers.musicgame-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.musicgame-frontend.loadbalancer.server.port=80"

volumes:
  postgres_data:

networks:
  # Réseau interne isolé pour l'application
  internal-network:
    driver: bridge
  # Liaison avec votre réseau Traefik existant nommé "proxy"
  traefik-network:
    external: true
    name: proxy